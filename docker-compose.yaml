services:
  app:
    image: medallion_pipeline
    build: .
    container_name: Medallion_pipeline
    command: uv run main.py
    volumes:
      - raw_parquet:/app/data/raw
      - transformed_silver:/app/data/silver
      - gx_docs:/app/gx
    depends_on:
      - postgres-db
    networks:
      - private_network

  postgres-db:
    image: postgres
    container_name: postgres_db 
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - data_sql:/var/lib/postgresql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:Z
    networks:
      - private_network
      - front_network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: always
    environment:
      MB_DB_FILE: /metabase-data/metabase
    volumes:
      - ./frontend/metabase_data:/metabase-data
    ports:
      - "3000:3000"
    networks:
      - front_network

  web-service:
    image: nginx:alpine
    container_name: static_web
    volumes:
      - gx_docs:/usr/share/nginx/html:ro
    ports:
      - "8080:80"

volumes:
  raw_parquet:
    name: "raw_parquet"
    labels:
      description: "Volume to handle just extracted data"
  
  transformed_silver:
    name: "transformed_silver"
    labels:
      description: "Volume to handle transformed data"

  data_sql:
    name: "data_sql"
    labels:
      description: "Postgresql persistent data storage"

  gx_docs:
    name: "gx_docs"
    labels:
      description: "Named volume to be shared amongst app (Medallion pipeline) and static_gx"

networks:
  private_network:
    driver: bridge
  front_network:
    driver: bridge